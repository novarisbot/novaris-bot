<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Duyurular</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#07090f;color:white;display:flex;min-height:100vh;overflow:hidden}
.sidebar{width:260px;background:#0d1018;border-right:1px solid rgba(255,255,255,.06);padding:24px;display:flex;flex-direction:column}
.logo{font-size:34px;font-weight:900;margin-bottom:35px;background:linear-gradient(135deg,#8b5cf6,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.menu{display:flex;flex-direction:column;gap:12px}
.menu a{padding:15px 18px;border-radius:18px;text-decoration:none;color:#d4d4d8;background:rgba(255,255,255,.03);transition:.25s;font-weight:600}
.menu a:hover,.menu a.active{background:linear-gradient(135deg,#7c3aed,#2563eb);color:white}
.main{flex:1;padding:35px;overflow:auto}
.card{background:#11131c;border:1px solid rgba(255,255,255,.06);border-radius:28px;padding:25px;margin-bottom:24px}
.input,textarea{width:100%;padding:16px;border-radius:16px;background:#191d29;border:none;outline:none;color:white;margin-top:14px;margin-bottom:14px}
.btn{padding:15px 20px;border:none;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:white;font-weight:700;cursor:pointer}
.activity{padding:18px;border-radius:18px;background:rgba(255,255,255,.03);margin-top:16px;border:1px solid rgba(255,255,255,.05)}
.actions{display:flex;gap:10px}
.edit{background:#f59e0b}
.delete{background:#dc2626}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:#7c3aed;border-radius:999px}

.promo-box{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.promo-code{
padding:12px 18px;
border-radius:14px;
background:#5d6b46;
border:1px dashed #c3d49c;
font-weight:700;
font-size:14px;
}

.promo-timer{
padding:12px 18px;
border-radius:14px;
background:#4f5c47;
border:1px solid #727f65;
font-weight:700;
font-size:14px;
}

.promo-button{
padding:12px 20px;
border:none;
border-radius:14px;
background:#f5ebc7;
color:#1a1a1a;
font-weight:800;
cursor:pointer;
text-decoration:none;
display:inline-flex;
align-items:center;
justify-content:center;
transition:.25s;
}

.promo-button:hover{
transform:translateY(-3px);
box-shadow:0 10px 30px rgba(245,235,199,.2);
}


.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
}

.modal.active{
display:flex;
}

.modal-box{
width:100%;
max-width:700px;
background:#11131c;
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:30px;
max-height:90vh;
overflow:auto;
}

.modal-title{
font-size:28px;
font-weight:800;
margin-bottom:20px;
}

.time-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

@media(max-width:700px){
.time-grid{
grid-template-columns:1fr;
}
}


.activity{
animation:fadeIn .3s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>
<body>

<div class="sidebar">
<div class="logo">NOVARIS</div>

<div class="menu">
<a href="panel.html">🏠 Genel Bakış</a>
<a class="active" href="announcements.html">📢 Duyurular</a>
<a href="bots.html">🤖 Bot Yönetimi</a>
<a href="settings.html">⚙️ Ayarlar</a>
<a href="system.html">🟢 Sistem Durumu</a>
<a href="../index.html">↩ Siteye Dön</a>
</div>

</div>

<div class="main">

<div class="card">

<h1>📢 Duyuru Yönetimi</h1>

<input class="input" id="title" placeholder="Duyuru Başlığı">

<textarea id="text" class="input" placeholder="Duyuru Mesajı"></textarea>

<div class="time-grid">

<input
type="number"
id="hours"
class="input"
placeholder="Saat">

<input
type="number"
id="minutes"
class="input"
placeholder="Dakika">

</div>


<input
type="text"
id="promoCode"
class="input"
placeholder="Kampanya Kodu (Örn: BAYRAM50)">

<input
type="text"
id="promoTimer"
class="input"
placeholder="Sayaç (Örn: 01:07:26)">

<input
type="text"
id="promoButton"
class="input"
placeholder="Buton Yazısı (Örn: Premium Ol)">

<input
type="text"
id="promoButtonUrl"
class="input"
placeholder="Buton URL (Örn: https://discord.gg/novaris)">


<button class="btn" onclick="publishAnnouncement()">
Duyuruyu Yayınla
</button>

</div>

<div class="card">

<h2>Son Duyurular</h2>

<div id="announcementList"></div>

</div>

</div>





<div class="modal" id="editModal">

<div class="modal-box">

<div class="modal-title">
Duyuruyu Düzenle
</div>

<input class="input" id="editTitle" placeholder="Başlık">

<textarea class="input" id="editText" placeholder="Mesaj"></textarea>

<div class="time-grid">

<input
type="number"
id="editHours"
class="input"
placeholder="Saat">

<input
type="number"
id="editMinutes"
class="input"
placeholder="Dakika">

</div>

<input class="input" id="editPromoCode" placeholder="Kampanya Kodu">

<input class="input" id="editPromoTimer" placeholder="Sayaç (01:30:00)">

<input class="input" id="editPromoButton" placeholder="Buton Yazısı">

<input class="input" id="editPromoButtonUrl" placeholder="Buton URL">

<div style="display:flex;gap:12px;margin-top:20px;">

<button class="btn" onclick="saveEdit()">
Kaydet
</button>

<button class="btn delete" onclick="closeModal()">
İptal
</button>

</div>

</div>

</div>

<script>

  function showSuccess(text){

document.getElementById(
"successText"
).innerText = text;

document.getElementById(
"successModal"
).classList.add(
"active"
);

}

function closeSuccess(){

document.getElementById(
"successModal"
).classList.remove(
"active"
);

}

const API_URL =
"https://novaris-api.onrender.com/api/announcement";

async function publishAnnouncement(){

const title =
document.getElementById("title").value;

const text =
document.getElementById("text").value;

const hours =
document.getElementById("hours").value || 0;

const minutes =
document.getElementById("minutes").value || 0;

const expire =
`${hours} Saat ${minutes} Dakika`;

const promoCode =
document.getElementById("promoCode").value;

const promoTimer =
document.getElementById("promoTimer").value;

const promoButton =
document.getElementById("promoButton").value;

const promoButtonUrl =
document.getElementById("promoButtonUrl").value;

if(!title || !text) return;

await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
enabled:true,
title:title,
text:text,
expire:expire,
promoCode:promoCode,
promoTimer:promoTimer,
promoButton:promoButton,
promoButtonUrl:promoButtonUrl,
date:new Date().toLocaleString("tr-TR")
})

});

document.getElementById("title").value="";
document.getElementById("text").value="";
document.getElementById("hours").value="";
document.getElementById("minutes").value="";
document.getElementById("promoCode").value="";
document.getElementById("promoTimer").value="";
document.getElementById("promoButton").value="";
document.getElementById("promoButtonUrl").value="";

renderAnnouncements();

}

async function renderAnnouncements(){

const list =
document.getElementById("announcementList");

list.innerHTML = "";

try{

const res =
await fetch(API_URL);

const data =
await res.json();

const announcements =
Array.isArray(data)
? data
: [data];

announcements.reverse().forEach((a,index)=>{

list.innerHTML += `

<div class="activity">

<div style="
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:20px;
flex-wrap:wrap;
">

<div style="flex:1;">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
gap:10px;
flex-wrap:wrap;
">

<h3>📢 ${a.title || 'Duyuru'}</h3>

<div style="
font-size:13px;
opacity:.7;
">
${a.date || ''}
</div>

</div>

<p style="
opacity:.8;
line-height:1.8;
margin-bottom:16px;
">
${a.text || ''}
</p>

</div>

<div class="promo-box">

${a.promoCode ? `
<div class="promo-code">
${a.promoCode}
</div>
` : ''}

${a.promoTimer ? `
<div class="promo-timer"
data-timer="${a.promoTimer}">
⏱ ${a.promoTimer}
</div>
` : ''}

${a.promoButton ? `
<a
href="${a.promoButtonUrl || '#' }"
target="_blank"
class="promo-button">
${a.promoButton}
</a>
` : ''}

</div>

</div>

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-top:18px;
gap:15px;
flex-wrap:wrap;
">

<div style="
padding:8px 12px;
border-radius:12px;
background:rgba(124,58,237,.15);
font-size:13px;
">
⏰ Süre: ${a.expire || "Süresiz"}
</div>

<div class="actions">

<button
class="btn edit"
onclick="editAnnouncement(${a.id})">
Düzenle
</button>

<button
class="btn delete"
onclick="deleteAnnouncement(${a.id})">
Sil
</button>

</div>

</div>

</div>

`;

});

startCountdowns();

}catch(err){

list.innerHTML = `
<div class="activity">
❌ Duyurular yüklenemedi.
</div>
`;

}

}

function startCountdowns(){

document.querySelectorAll("[data-timer]").forEach(el=>{

let time = el.dataset.timer;

if(!time.includes(":")) return;

let parts = time.split(":").map(Number);

let total =
(parts[0] * 3600) +
(parts[1] * 60) +
(parts[2]);

setInterval(()=>{

if(total <= 0){

el.innerHTML = "⏱ Süre Doldu";
return;

}

total--;

let h =
String(Math.floor(total / 3600)).padStart(2,"0");

let m =
String(Math.floor((total % 3600)/60)).padStart(2,"0");

let s =
String(total % 60).padStart(2,"0");

el.innerHTML =
`⏱ ${h}:${m}:${s}`;

},1000);

});

}


let deletingId = null;

function deleteAnnouncement(id){
deletingId = id;
document.getElementById("deleteModal").classList.add("active");
}

function closeDeleteModal(){
document.getElementById("deleteModal").classList.remove("active");
}

async function confirmDelete(){
if(!deletingId) return;

const res = await fetch(API_URL + "/" + deletingId,{method:"DELETE"});
const data = await res.json();

if(data.success){

closeDeleteModal();

deletingId = null;

showToast("🗑️ Duyuru başarıyla silindi.","success");

renderAnnouncements();

}
}

let editingId = null;

async function editAnnouncement(id){

editingId = id;

const res = await fetch(API_URL);

const data = await res.json();

const announcements =
Array.isArray(data)
? data
: [data];

const a =
announcements.find(x => x.id === id);

if(!a) return;

document.getElementById("editTitle").value =
a.title || "";

document.getElementById("editText").value =
a.text || "";

document.getElementById("editPromoCode").value =
a.promoCode || "";

document.getElementById("editPromoTimer").value =
a.promoTimer || "";

document.getElementById("editPromoButton").value =
a.promoButton || "";

document.getElementById("editPromoButtonUrl").value =
a.promoButtonUrl || "";

document.getElementById("editModal")
.classList.add("active");

}

function closeModal(){

document.getElementById("editModal")
.classList.remove("active");

}

async function saveEdit(){

const updated={
title:document.getElementById("editTitle").value,
text:document.getElementById("editText").value,
promoCode:document.getElementById("editPromoCode").value,
promoTimer:document.getElementById("editPromoTimer").value,
promoButton:document.getElementById("editPromoButton").value,
promoButtonUrl:document.getElementById("editPromoButtonUrl").value
};

const res = await fetch(API_URL + "/" + editingId,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(updated)
});

const data = await res.json();

if(data.success){

closeModal();

showToast("✅ Duyuru başarıyla güncellendi.","success");

renderAnnouncements();

}
}

window.onload = renderAnnouncements;

</script>





<div class="modal" id="deleteModal">
<div class="modal-box" style="max-width:500px;">
<div class="modal-title">Duyuruyu Sil</div>
<p style="margin-bottom:20px;">Bu duyuruyu silmek istediğine emin misin?</p>
<div style="display:flex;gap:10px;">
<button class="btn delete" onclick="confirmDelete()">Evet, Sil</button>
<button class="btn" onclick="closeDeleteModal()">İptal</button>
</div>
</div>
</div>
<div id="successModal" class="modal">

<div class="modal-box"
style="
max-width:450px;
text-align:center;
">

<div style="
font-size:70px;
margin-bottom:15px;
">
✅
</div>

<h2 id="successText">
İşlem başarılı
</h2>

<button
class="btn"
style="margin-top:20px"
onclick="closeSuccess()">
Tamam
</button>

</div>

</div>

<style>
.toast{
position:fixed;
top:20px;
right:20px;
background:#11131c;
border:1px solid rgba(255,255,255,.08);
padding:16px 20px;
border-radius:16px;
z-index:10000;
backdrop-filter:blur(15px);
transform:translateX(400px);
transition:.35s;
font-weight:700;
}
.toast.show{transform:translateX(0);}
</style>

<div id="toast" class="toast"></div>

<script>
function showToast(text){
const t=document.getElementById("toast");
t.innerText=text;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),3000);
}

document.addEventListener("keydown",e=>{
if(e.key==="Escape"){
document.getElementById("editModal")?.classList.remove("active");
document.getElementById("deleteModal")?.classList.remove("active");
}
});
</script>

</body>
</html>
