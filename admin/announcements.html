<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Duyurular</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#07090f;color:white;display:flex;min-height:100vh;overflow:hidden}
.sidebar{width:260px;background:#0d1018;border-right:1px solid rgba(255,255,255,.06);padding:24px;display:flex;flex-direction:column}
.logo{font-size:34px;font-weight:900;margin-bottom:35px;background:linear-gradient(135deg,#8b5cf6,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.menu{display:flex;flex-direction:column;gap:12px}
.menu a{padding:15px 18px;border-radius:18px;text-decoration:none;color:#d4d4d8;background:rgba(255,255,255,.03);transition:.25s;font-weight:600}
.menu a:hover,.menu a.active{background:linear-gradient(135deg,#7c3aed,#2563eb);color:white}
.main{flex:1;padding:35px;overflow:auto}
.card{background:#11131c;border:1px solid rgba(255,255,255,.06);border-radius:28px;padding:25px;margin-bottom:24px}
.input,textarea{width:100%;padding:16px;border-radius:16px;background:#191d29;border:none;outline:none;color:white;margin-top:14px;margin-bottom:14px}
.btn{padding:15px 20px;border:none;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:white;font-weight:700;cursor:pointer}
.activity{padding:18px;border-radius:18px;background:rgba(255,255,255,.03);margin-top:16px;border:1px solid rgba(255,255,255,.05)}
.actions{display:flex;gap:10px}
.edit{background:#f59e0b}
.delete{background:#dc2626}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-thumb{background:#7c3aed;border-radius:999px}
</style>

</head>
<body>

<div class="sidebar">
<div class="logo">NOVARIS</div>

<div class="menu">
<a href="panel.html">🏠 Genel Bakış</a>
<a class="active" href="announcements.html">📢 Duyurular</a>
<a href="bots.html">🤖 Bot Yönetimi</a>
<a href="settings.html">⚙️ Ayarlar</a>
<a href="system.html">🟢 Sistem Durumu</a>
<a href="../index.html">↩ Siteye Dön</a>
</div>

</div>

<div class="main">

<div class="card">

<h1>📢 Duyuru Yönetimi</h1>

<input class="input" id="title" placeholder="Duyuru Başlığı">

<textarea id="text" class="input" placeholder="Duyuru Mesajı"></textarea>

<input
type="text"
id="expire"
class="input"
placeholder="Zamanlayıcı (Örn: 24 Saat / 1 Hafta / Süresiz)">


<input
type="text"
id="promoCode"
class="input"
placeholder="Kampanya Kodu (Örn: BAYRAM50)">

<input
type="text"
id="promoTimer"
class="input"
placeholder="Sayaç (Örn: 01:07:26)">

<input
type="text"
id="promoButton"
class="input"
placeholder="Buton Yazısı (Örn: Premium Ol)">


<button class="btn" onclick="publishAnnouncement()">
Duyuruyu Yayınla
</button>

</div>

<div class="card">

<h2>Son Duyurular</h2>

<div id="announcementList"></div>

</div>

</div>



<script>

const API_URL =
"https://novaris-api.onrender.com/api/announcement";

async function publishAnnouncement(){

const title =
document.getElementById("title").value;

const text =
document.getElementById("text").value;

const expire =
document.getElementById("expire").value;

const promoCode =
document.getElementById("promoCode").value;

const promoTimer =
document.getElementById("promoTimer").value;

const promoButton =
document.getElementById("promoButton").value;

if(!title || !text) return;

await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
enabled:true,
title:title,
text:text,
expire:expire,
promoCode:promoCode,
promoTimer:promoTimer,
promoButton:promoButton,
date:new Date().toLocaleString("tr-TR")
})

});

document.getElementById("title").value="";
document.getElementById("text").value="";
document.getElementById("expire").value="";
document.getElementById("promoCode").value="";
document.getElementById("promoTimer").value="";
document.getElementById("promoButton").value="";

renderAnnouncements();

}

async function renderAnnouncements(){

const list =
document.getElementById("announcementList");

list.innerHTML = "";

try{

const res =
await fetch(API_URL);

const data =
await res.json();

const announcements =
Array.isArray(data)
? data
: [data];

announcements.reverse().forEach((a,index)=>{

list.innerHTML += `

<div class="activity">

<div style="
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:20px;
flex-wrap:wrap;
">

<div style="flex:1;">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
gap:10px;
flex-wrap:wrap;
">

<h3>📢 ${a.title || 'Duyuru'}</h3>

<div style="
font-size:13px;
opacity:.7;
">
${a.date || ''}
</div>

</div>

<p style="
opacity:.8;
line-height:1.7;
margin-bottom:14px;
">
${a.text || ''}
</p>

</div>

<div style="
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
">

${a.promoCode ? `
<div style="
padding:12px 18px;
border-radius:14px;
background:#5d6b46;
border:1px dashed #c3d49c;
font-weight:700;
font-size:14px;
">
${a.promoCode}
</div>
` : ''}

${a.promoTimer ? `
<div style="
padding:12px 18px;
border-radius:14px;
background:#4f5c47;
border:1px solid #727f65;
font-weight:700;
font-size:14px;
">
⏱ ${a.promoTimer}
</div>
` : ''}

${a.promoButton ? `
<button style="
padding:12px 20px;
border:none;
border-radius:14px;
background:#f5ebc7;
color:#1a1a1a;
font-weight:800;
cursor:pointer;
">
${a.promoButton}
</button>
` : ''}

</div>

</div>

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-top:18px;
gap:15px;
flex-wrap:wrap;
">

<div style="
padding:8px 12px;
border-radius:12px;
background:rgba(124,58,237,.15);
font-size:13px;
">
⏰ Süre: ${a.expire || "Süresiz"}
</div>

<div class="actions">

<button
class="btn edit"
onclick="editAnnouncement(${index})">
Düzenle
</button>

<button
class="btn delete"
onclick="deleteAnnouncement(${index})">
Sil
</button>

</div>

</div>

</div>

`;

});

}catch(err){

list.innerHTML = `
<div class="activity">
❌ Duyurular yüklenemedi.
</div>
`;

}

}

async function deleteAnnouncement(index){

alert("API sistemi olduğu için backend silme endpointi gerekiyor.");

}

async function editAnnouncement(index){

const res =
await fetch(API_URL);

const data =
await res.json();

const announcements =
Array.isArray(data)
? data
: [data];

const a = announcements[index];

document.getElementById("title").value =
a.title || "";

document.getElementById("text").value =
a.text || "";

document.getElementById("expire").value =
a.expire || "";

document.getElementById("promoCode").value =
a.promoCode || "";

document.getElementById("promoTimer").value =
a.promoTimer || "";

document.getElementById("promoButton").value =
a.promoButton || "";

}

window.onload = renderAnnouncements;

</script>



</body>
</html>
