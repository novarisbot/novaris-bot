
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bot Yönetimi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#07090f;color:white;display:flex;min-height:100vh;overflow:hidden}
.sidebar{width:260px;background:#0d1018;border-right:1px solid rgba(255,255,255,.06);padding:24px;display:flex;flex-direction:column}
.logo{font-size:34px;font-weight:900;margin-bottom:35px;background:linear-gradient(135deg,#8b5cf6,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.menu{display:flex;flex-direction:column;gap:12px}
.menu a{padding:15px 18px;border-radius:18px;text-decoration:none;color:#d4d4d8;background:rgba(255,255,255,.03);transition:.25s;font-weight:600}
.menu a:hover,.menu a.active{background:linear-gradient(135deg,#7c3aed,#2563eb);color:white}
.main{flex:1;padding:35px;overflow:auto}
.card{background:#11131c;border:1px solid rgba(255,255,255,.06);border-radius:28px;padding:25px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.stat{padding:28px;border-radius:24px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}
.stat h2{font-size:42px;margin-bottom:8px}
.input,textarea,select{width:100%;padding:16px;border-radius:16px;background:#191d29;border:none;outline:none;color:white;margin-top:14px;margin-bottom:14px}
.btn{padding:15px 20px;border:none;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:white;font-weight:700;cursor:pointer}
.bot-card{display:flex;justify-content:space-between;align-items:center;padding:20px;border-radius:20px;background:rgba(255,255,255,.03);margin-top:14px;border:1px solid rgba(255,255,255,.05)}
.online{color:#4ade80;font-weight:700}
.offline{color:#ff4d6d;font-weight:700}
.activity{padding:16px;border-radius:16px;background:rgba(255,255,255,.03);margin-top:12px}
.actions{display:flex;gap:10px}
.edit{background:#f59e0b}
.delete{background:#dc2626}
</style>

</head>
<body>

<div class="sidebar">
<div class="logo">NOVARIS</div>

<div class="menu">
<a class="active" href="panel.html">🏠 Genel Bakış</a>
<a href="announcements.html">📢 Duyurular</a>
<a href="bots.html">🤖 Bot Yönetimi</a>
<a href="settings.html">⚙️ Ayarlar</a>
<a href="system.html">🟢 Sistem Durumu</a>
<a href="../index.html">↩ Siteye Dön</a>
</div>

</div>

<div class="main">

<div class="card">

<h1>🤖 Bot Yönetimi</h1>

<input class="input" id="botName" placeholder="Bot Adı">

<textarea class="input" id="botDescription" placeholder="Bot Açıklaması"></textarea>

<input class="input" id="botLogo" placeholder="Emoji Logo">

<input class="input" id="botStatus" placeholder="AKTİF / OFFLINE">

<input class="input" id="botURL" placeholder="Bot URL">

<button class="btn" onclick="addBot()">
Bot Ekle
</button>

</div>

<div class="card">

<h2>Botlar</h2>

<div id="botList"></div>

</div>

</div>

<script>

function getBots(){
return JSON.parse(localStorage.getItem("novaris_bots") || "[]");
}

function saveBots(bots){
localStorage.setItem("novaris_bots",JSON.stringify(bots));
}

function renderBots(){

const list =
document.getElementById("botList");

list.innerHTML = "";

getBots().forEach((bot,index)=>{

const offline =
bot.status.toLowerCase().includes("off");

list.innerHTML += `
<div class="bot-card">

<div>
<h3>${bot.logo} ${bot.name}</h3>

<p style="opacity:.7;margin-top:6px;">
${bot.description}
</p>

<p class="${offline ? 'offline' : 'online'}"
style="margin-top:8px;">
${bot.status}
</p>
</div>

<div class="actions">

<button class="btn edit"
onclick="editBot(${index})">
Düzenle
</button>

<button class="btn delete"
onclick="deleteBot(${index})">
Sil
</button>

</div>

</div>
`;

});

}

function addBot(){

const bots = getBots();

bots.unshift({
name:botName.value,
description:botDescription.value,
logo:botLogo.value,
status:botStatus.value,
url:botURL.value
});

saveBots(bots);

renderBots();

document.querySelectorAll("input").forEach(x=>x.value="");
document.querySelectorAll("textarea").forEach(x=>x.value="");

}

function deleteBot(index){

const bots = getBots();

bots.splice(index,1);

saveBots(bots);

renderBots();

}

function editBot(index){

const bots = getBots();

const bot = bots[index];

botName.value = bot.name;
botDescription.value = bot.description;
botLogo.value = bot.logo;
botStatus.value = bot.status;
botURL.value = bot.url;

bots.splice(index,1);

saveBots(bots);

renderBots();

}

window.onload = renderBots;

</script>

</body>
</html>
