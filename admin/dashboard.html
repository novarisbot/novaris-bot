
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Novaris Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:#07070a;color:#fff;display:flex;min-height:100vh}
.sidebar{
width:260px;
background:#0d0d12;
border-right:1px solid rgba(255,255,255,.06);
padding:25px;
display:flex;
flex-direction:column;
gap:14px
}
.logo{
font-size:32px;
font-weight:800;
margin-bottom:20px;
background:linear-gradient(135deg,#7c3aed,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent
}
.nav-btn{
padding:14px 18px;
border-radius:16px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
color:#fff;
text-decoration:none;
display:block;
transition:.25s
}
.nav-btn:hover{background:#7c3aed}
.main{flex:1;padding:35px}
.card{
background:#101017;
border:1px solid rgba(255,255,255,.06);
border-radius:24px;
padding:24px;
margin-bottom:24px
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px
}
.stat{
padding:24px;
border-radius:22px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.05)
}
h1{margin-bottom:25px}
input,textarea,select{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:#181820;
color:#fff;
margin-top:12px;
margin-bottom:12px
}
button{
padding:14px 18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#7c3aed,#3b82f6);
color:#fff;
font-weight:700;
cursor:pointer
}
.bot-card{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,.03);
margin-top:12px
}
.status-online{color:#4ade80}
.status-offline{color:#ff4d6d}
.actions{display:flex;gap:10px}
.delete{background:#dc2626}
.edit{background:#f59e0b}
.activity{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,.03);
margin-top:12px
}
</style>

</head>
<body>

<div class="sidebar">
<div class="logo">NOVARIS</div>

<a class="nav-btn" href="dashboard.html">🏠 Genel Bakış</a>
<a class="nav-btn" href="announcements.html">📢 Duyurular</a>
<a class="nav-btn" href="bots.html">🤖 Bot Yönetimi</a>
<a class="nav-btn" href="settings.html">⚙️ Ayarlar</a>
<a class="nav-btn" href="system.html">🟢 Sistem Durumu</a>

</div>


<div class="main">
<h1>🏠 Genel Bakış</h1>

<div class="grid">
<div class="stat"><h2 id="users">0</h2><p>Toplam Kullanıcı</p></div>
<div class="stat"><h2 id="servers">0</h2><p>Aktif Sunucu</p></div>
<div class="stat"><h2 id="premium">0</h2><p>Premium Kullanıcı</p></div>
<div class="stat"><h2 class="status-online">Aktif</h2><p>Sistem Durumu</p></div>
</div>

<div class="card">
<h2>⚡ Canlı Aktiviteler</h2>

<div class="activity">🤖 Yeni bot sisteme eklendi</div>
<div class="activity">📢 Yeni duyuru yayınlandı</div>
<div class="activity">🟢 Sistem başarıyla başlatıldı</div>

</div>

</div>


<script>
function getBots(){
return JSON.parse(localStorage.getItem("novaris_bots")||"[]");
}

function saveBots(bots){
localStorage.setItem("novaris_bots",JSON.stringify(bots));
}

function renderBots(){
const area=document.getElementById("botList");
if(!area) return;

area.innerHTML="";

getBots().forEach((bot,index)=>{

const statusClass =
bot.status.toLowerCase().includes("off")
? "status-offline"
: "status-online";

area.innerHTML += `
<div class="bot-card">
<div>
<h3>${bot.logo} ${bot.name}</h3>
<p>${bot.description}</p>
<p class="${statusClass}">${bot.status}</p>
</div>

<div class="actions">
<button class="edit" onclick="editBot(${index})">Düzenle</button>
<button class="delete" onclick="deleteBot(${index})">Sil</button>
</div>
</div>
`;

});
}

function addBot(){

const bots=getBots();

bots.unshift({
name:botName.value,
description:botDescription.value,
logo:botLogo.value,
status:botStatus.value,
url:botURL.value
});

saveBots(bots);
renderBots();

document.querySelectorAll("input").forEach(i=>i.value="");
document.querySelectorAll("textarea").forEach(i=>i.value="");

}

function deleteBot(index){
const bots=getBots();
bots.splice(index,1);
saveBots(bots);
renderBots();
}

function editBot(index){

const bots=getBots();
const bot=bots[index];

botName.value=bot.name;
botDescription.value=bot.description;
botLogo.value=bot.logo;
botStatus.value=bot.status;
botURL.value=bot.url;

bots.splice(index,1);

saveBots(bots);
renderBots();

}

window.onload=()=>{
renderBots();

const users=document.getElementById("users");
if(users) users.innerText=Math.floor(Math.random()*4000)+1000;

const servers=document.getElementById("servers");
if(servers) servers.innerText=Math.floor(Math.random()*900)+100;

const premium=document.getElementById("premium");
if(premium) premium.innerText=Math.floor(Math.random()*500)+50;
}
</script>

</body>
</html>
