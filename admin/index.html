<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Novaris Admin Login</title>

<link rel="icon"
type="image/png"
href="https://i.imgur.com/rycsHTs.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#050505;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* Background */

.bg{
position:absolute;
inset:0;
overflow:hidden;
z-index:-10;
}

.orb{
position:absolute;
border-radius:50%;
filter:blur(140px);
opacity:.3;
animation:float 10s infinite ease-in-out;
}

.orb1{
width:500px;
height:500px;
background:#5865F2;
top:-150px;
left:-150px;
}

.orb2{
width:400px;
height:400px;
background:#7c3aed;
bottom:-150px;
right:-150px;
animation-delay:2s;
}

.orb3{
width:300px;
height:300px;
background:#00d4ff;
top:40%;
left:50%;
animation-delay:4s;
}

@keyframes float{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-30px);
}

}

/* Card */

.card{

width:430px;
padding:40px;
border-radius:34px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(30px);

box-shadow:
0 20px 80px rgba(0,0,0,.45),
0 0 80px rgba(88,101,242,.15);

text-align:center;

}

/* Logo */

.logo{

width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin-bottom:22px;

border:
3px solid rgba(255,255,255,.08);

}

h1{

font-size:42px;
font-weight:800;
margin-bottom:14px;

}

p{

opacity:.7;
line-height:1.7;
margin-bottom:28px;

}

/* Input */

.input{

width:100%;
padding:18px 20px;

border-radius:18px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

outline:none;
color:white;

font-size:15px;

margin-bottom:18px;

}

/* Button */

.btn{

width:100%;
padding:18px;

border:none;
border-radius:18px;

background:
linear-gradient(
135deg,
#5865F2,
#7c3aed
);

color:white;
font-weight:700;
font-size:16px;

cursor:pointer;

transition:.25s;

}

.btn:hover{

transform:
translateY(-5px)
scale(1.02);

box-shadow:
0 20px 60px rgba(88,101,242,.25);

}

/* Error */

#error{

margin-top:18px;
color:#ff4d6d;
font-weight:600;
display:none;

}

</style>
</head>

<body>

<div class="bg">

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

</div>

<div class="card">

<img
src="https://i.imgur.com/rycsHTs.png"
class="logo">

<h1>
Admin Login
</h1>

<p>
Novaris yönetim paneline erişmek için giriş yap.
</p>

<input
type="password"
id="password"
class="input"
placeholder="Admin Şifresi">

<button
class="btn"
onclick="login()">

Panele Giriş Yap

</button>

<div id="error">
Hatalı şifre.
</div>

</div>

<script>

/* Eğer giriş yapılmışsa direkt panel */

const access =
localStorage.getItem(
"admin_access"
);

if(access === "true"){

window.location.href =
"/admin/panel.html";

}

/* Şifre */

const ADMIN_PASSWORD =
"Kerem1026";

/* Login */

function login(){

const password =
document.getElementById(
"password"
).value;

if(password === ADMIN_PASSWORD){

localStorage.setItem(
"admin_access",
"true"
);

window.location.href =
"/admin/panel.html";

}else{

document
.getElementById(
"error"
)
.style.display =
"block";

}

}

</script>

</body>
</html>
