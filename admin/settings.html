
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ayarlar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:#07070a;color:#fff;display:flex;min-height:100vh}
.sidebar{
width:260px;
background:#0d0d12;
border-right:1px solid rgba(255,255,255,.06);
padding:25px;
display:flex;
flex-direction:column;
gap:14px
}
.logo{
font-size:32px;
font-weight:800;
margin-bottom:20px;
background:linear-gradient(135deg,#7c3aed,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent
}
.nav-btn{
padding:14px 18px;
border-radius:16px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
color:#fff;
text-decoration:none;
display:block;
transition:.25s
}
.nav-btn:hover{background:#7c3aed}
.main{flex:1;padding:35px}
.card{
background:#101017;
border:1px solid rgba(255,255,255,.06);
border-radius:24px;
padding:24px;
margin-bottom:24px
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px
}
.stat{
padding:24px;
border-radius:22px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.05)
}
h1{margin-bottom:25px}
input,textarea,select{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:#181820;
color:#fff;
margin-top:12px;
margin-bottom:12px
}
button{
padding:14px 18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#7c3aed,#3b82f6);
color:#fff;
font-weight:700;
cursor:pointer
}
.bot-card{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,.03);
margin-top:12px
}
.status-online{color:#4ade80}
.status-offline{color:#ff4d6d}
.actions{display:flex;gap:10px}
.delete{background:#dc2626}
.edit{background:#f59e0b}
.activity{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,.03);
margin-top:12px
}
</style>

</head>
<body>

<div class="sidebar">
<div class="logo">NOVARIS</div>

<a class="nav-btn" href="dashboard.html">🏠 Genel Bakış</a>
<a class="nav-btn" href="announcements.html">📢 Duyurular</a>
<a class="nav-btn" href="bots.html">🤖 Bot Yönetimi</a>
<a class="nav-btn" href="settings.html">⚙️ Ayarlar</a>
<a class="nav-btn" href="system.html">🟢 Sistem Durumu</a>

</div>


<div class="main">

<h1>⚙️ Ayarlar</h1>

<div class="card">

<h2>Tema Ayarları</h2>

<select>
<option>Mor Tema</option>
<option>Mavi Tema</option>
<option>Kırmızı Tema</option>
</select>

<button>Ayarları Kaydet</button>

</div>

</div>

</body>
</html>
