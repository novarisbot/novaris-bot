<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Novaris Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#030303;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* Animated Background */

.bg{
position:absolute;
inset:0;
overflow:hidden;
}

.orb{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.45;
animation:float 10s infinite ease-in-out;
}

.orb1{
width:420px;
height:420px;
background:#5865F2;
top:-120px;
left:-120px;
}

.orb2{
width:350px;
height:350px;
background:#7c3aed;
bottom:-100px;
right:-100px;
animation-delay:2s;
}

.orb3{
width:250px;
height:250px;
background:#00d4ff;
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation-delay:4s;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-30px);
}
}

/* Particles */

.particles{
position:absolute;
inset:0;
overflow:hidden;
}

.particles span{
position:absolute;
display:block;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.15;
animation:particle 8s linear infinite;
}

@keyframes particle{
0%{
transform:translateY(100vh) scale(0);
}
100%{
transform:translateY(-100vh) scale(1);
}
}

/* Card */

.card{
position:relative;
width:420px;
padding:45px;
border-radius:34px;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(35px);

box-shadow:
0 20px 80px rgba(0,0,0,.45),
0 0 80px rgba(88,101,242,.18);

text-align:center;

animation:
cardEnter 1s ease;
}

@keyframes cardEnter{
from{
opacity:0;
transform:
translateY(40px)
scale(.9);
}
to{
opacity:1;
transform:
translateY(0)
scale(1);
}
}

/* Avatar */

.avatar-wrapper{
position:relative;
width:130px;
height:130px;
margin:auto;
margin-bottom:24px;
}

.avatar-ring{
position:absolute;
inset:-6px;
border-radius:50%;

background:
conic-gradient(
#5865F2,
#7c3aed,
#00d4ff,
#5865F2
);

animation:spin 4s linear infinite;

filter:
blur(.5px);
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.avatar{
position:relative;
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
border:5px solid #0b0b0b;
z-index:2;
}

/* Text */

.status{
display:inline-flex;
align-items:center;
gap:8px;

padding:8px 16px;
border-radius:999px;

background:
rgba(88,101,242,.14);

border:
1px solid rgba(88,101,242,.25);

font-size:14px;
font-weight:600;

margin-bottom:20px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#57F287;

box-shadow:
0 0 20px #57F287;
}

h1{
font-size:38px;
font-weight:800;
margin-bottom:12px;
}

p{
opacity:.7;
font-size:16px;
line-height:1.6;
margin-bottom:32px;
}

/* Button */

.btn{
display:inline-flex;
align-items:center;
justify-content:center;

width:100%;
padding:18px;

border-radius:18px;

background:
linear-gradient(
135deg,
#5865F2,
#7c3aed
);

color:white;
font-weight:700;
font-size:16px;
text-decoration:none;

transition:.3s;

box-shadow:
0 15px 40px rgba(88,101,242,.35);
}

.btn:hover{
transform:
translateY(-5px)
scale(1.02);

box-shadow:
0 25px 60px rgba(88,101,242,.45);
}

/* Loading */

.loading{
margin-top:22px;
display:flex;
justify-content:center;
gap:8px;
}

.loading span{
width:10px;
height:10px;
border-radius:50%;
background:white;

animation:bounce 1.2s infinite;
}

.loading span:nth-child(2){
animation-delay:.2s;
}

.loading span:nth-child(3){
animation-delay:.4s;
}

@keyframes bounce{
0%,80%,100%{
transform:scale(0);
opacity:.4;
}
40%{
transform:scale(1);
opacity:1;
}
}

</style>
</head>

<body>

<div class="bg">
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
</div>

<div class="particles" id="particles"></div>

<div class="card">

<div class="status">
<div class="dot"></div>
Discord Başarıyla Bağlandı
</div>

<div class="avatar-wrapper">

<div class="avatar-ring"></div>

<img id="avatar"
class="avatar">

</div>

<h1 id="username">
Yükleniyor...
</h1>

<p>
Discord hesabın başarıyla bağlandı.
Dashboard hazırlanıyor...
</p>

<a href="/"
class="btn">
Ana Sayfaya Dön
</a>

<div class="loading">
<span></span>
<span></span>
<span></span>
</div>

</div>

<script>

/* particles */

const particles =
document.getElementById("particles");

for(let i=0;i<45;i++){

const span =
document.createElement("span");

span.style.left =
Math.random()*100+"%";

span.style.animationDuration =
(5 + Math.random()*6)+"s";

span.style.opacity =
Math.random()*.25;

span.style.width =
span.style.height =
(2 + Math.random()*4)+"px";

particles.appendChild(span);

}

/* discord user */

const params =
new URLSearchParams(
window.location.hash.slice(1)
);

const token =
params.get("access_token");

if(token){

fetch(
"https://discord.com/api/users/@me",
{
headers:{
authorization:
`Bearer ${token}`
}
})
.then(res=>res.json())
.then(user=>{

document
.getElementById("username")
.innerText =
user.global_name || user.username;

document
.getElementById("avatar")
.src =
`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;

});

}

</script>

</body>
</html>
