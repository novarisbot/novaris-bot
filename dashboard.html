<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novaris Dashboard - Bakımda</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#05070d;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
position:relative;
}

/* Aurora */

.orb{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.35;
animation:float 12s infinite ease-in-out;
}

.orb1{
width:500px;
height:500px;
background:#5865F2;
top:-150px;
left:-150px;
}

.orb2{
width:450px;
height:450px;
background:#7c3aed;
right:-150px;
bottom:-150px;
animation-delay:2s;
}

.orb3{
width:300px;
height:300px;
background:#00d4ff;
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation-delay:4s;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-40px);
}
}

/* Card */

.container{
width:90%;
max-width:900px;
padding:60px;
border-radius:35px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.08);
text-align:center;
position:relative;
z-index:5;
}

.logo{
font-size:70px;
margin-bottom:20px;
animation:rotate 6s linear infinite;
}

@keyframes rotate{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

h1{
font-size:58px;
font-weight:800;
margin-bottom:15px;
background:linear-gradient(135deg,#5865F2,#7c3aed,#00d4ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
font-size:18px;
opacity:.8;
line-height:1.8;
max-width:700px;
margin:auto;
}

.status{
display:inline-flex;
align-items:center;
gap:10px;
padding:14px 22px;
border-radius:999px;
margin-top:30px;
background:rgba(88,101,242,.15);
border:1px solid rgba(88,101,242,.25);
font-weight:700;
}

.dot{
width:12px;
height:12px;
background:#00ff88;
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}

.buttons{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-top:35px;
}

.btn{
padding:16px 28px;
border-radius:18px;
text-decoration:none;
font-weight:700;
color:white;
transition:.3s;
}

.primary{
background:linear-gradient(135deg,#5865F2,#7c3aed);
}

.secondary{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
}

.btn:hover{
transform:translateY(-5px);
}

.countdown{
margin-top:40px;
font-size:28px;
font-weight:800;
letter-spacing:3px;
}
</style>

</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">

<div class="logo">🚧</div>

<h1>Dashboard Bakımda</h1>

<p>
Novaris Dashboard şu anda geliştirilmektedir.
Daha hızlı, daha modern ve çok daha güçlü bir yönetim paneli üzerinde çalışıyoruz.
Yakında tekrar hizmetinizde olacak.
</p>

<div class="status">
<div class="dot"></div>
Geliştirme Devam Ediyor
</div>

<div class="buttons">
<a href="../index.html" class="btn primary">
Ana Sayfaya Dön
</a>

<a href="https://discord.gg/KdquMm7KxS" class="btn secondary">
Discord Sunucusu
</a>
</div>

<div class="countdown" id="countdown">
COMING SOON
</div>

</div>

<script>
const countdown =
document.getElementById("countdown");

let dots = 0;

setInterval(()=>{
dots++;
if(dots > 3) dots = 0;
countdown.innerText =
"COMING SOON" + ".".repeat(dots);
},500);
</script>

</body>
</html>
