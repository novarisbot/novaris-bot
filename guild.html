<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Novaris Guild Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#050505;
color:white;
padding:40px;
overflow-x:hidden;
}

/* Background */

.bg{
position:fixed;
inset:0;
z-index:-10;
overflow:hidden;
}

.orb{
position:absolute;
border-radius:50%;
filter:blur(140px);
opacity:.22;
animation:float 10s infinite ease-in-out;
}

.orb1{
width:500px;
height:500px;
background:#5865F2;
top:-180px;
left:-180px;
}

.orb2{
width:400px;
height:400px;
background:#7c3aed;
bottom:-150px;
right:-150px;
animation-delay:2s;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-30px);
}
}

/* Header */

.header{
display:flex;
align-items:center;
gap:24px;
margin-bottom:50px;
}

.guild-icon{
width:120px;
height:120px;
border-radius:32px;
object-fit:cover;

border:
2px solid rgba(255,255,255,.08);

box-shadow:
0 20px 60px rgba(88,101,242,.18);
}

.header h1{
font-size:52px;
font-weight:800;
margin-bottom:12px;
}

.header p{
opacity:.7;
font-size:18px;
}

/* Grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:28px;
}

/* Card */

.card{
padding:32px;
border-radius:32px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:
blur(20px);

transition:.3s;

position:relative;
overflow:hidden;
}

.card:hover{
transform:
translateY(-12px)
rotateX(5deg)
rotateY(-5deg);

box-shadow:
0 25px 80px rgba(88,101,242,.18);
}

.glow{
position:absolute;
width:240px;
height:240px;

background:
radial-gradient(circle,
rgba(88,101,242,.25),
transparent 70%);

top:-120px;
right:-120px;
}

/* Text */

.card h2{
font-size:28px;
margin-bottom:14px;
}

.card p{
opacity:.7;
line-height:1.7;
margin-bottom:24px;
}

/* Button */

.btn{
display:flex;
justify-content:center;
align-items:center;

padding:18px;

border-radius:18px;

background:
linear-gradient(
135deg,
#5865F2,
#7c3aed
);

color:white;
font-weight:700;
text-decoration:none;

transition:.25s;
}

.btn:hover{
transform:
translateY(-4px)
scale(1.03);

box-shadow:
0 20px 60px rgba(88,101,242,.28);
}

</style>
</head>

<body>

<div class="bg">
<div class="orb orb1"></div>
<div class="orb orb2"></div>
</div>

<div class="header">

<img
id="guildIcon"
class="guild-icon"
src="https://cdn.discordapp.com/embed/avatars/0.png">

<div>

<h1 id="guildName">
Sunucu
</h1>

<p>
Sunucu yönetim paneli
</p>

</div>

</div>

<div class="grid">

<div class="card">

<div class="glow"></div>

<h2>
🤖 Kayıt Botu
</h2>

<p>
Kayıt sistemi ayarlarını yönet.
</p>

<a href="#"
class="btn">
Yönet
</a>

</div>

<div class="card">

<div class="glow"></div>

<h2>
🚀 Booster Botu
</h2>

<p>
Booster sistemi ayarlarını yönet.
</p>

<a href="#"
class="btn">
Yönet
</a>

</div>

<div class="card">

<div class="glow"></div>

<h2>
🔒 Özel Oda
</h2>

<p>
Özel oda sistemi ayarlarını yönet.
</p>

<a href="#"
class="btn">
Yönet
</a>

</div>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const guildID =
params.get("id");

const token =
localStorage.getItem(
"discord_token"
);

if(token){

fetch(
"https://discord.com/api/users/@me/guilds",
{
headers:{
authorization:
`Bearer ${token}`
}
})
.then(res=>res.json())
.then(guilds=>{

const guild =
guilds.find(
g=>g.id===guildID
);

if(!guild) return;

document
.getElementById("guildName")
.innerText =
guild.name;

document
.getElementById("guildIcon")
.src =
guild.icon
? `https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png`
: "https://cdn.discordapp.com/embed/avatars/0.png";

});

}

</script>

</body>
</html>
